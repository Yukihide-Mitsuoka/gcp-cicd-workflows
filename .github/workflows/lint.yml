# This repo's own CI: static-check every workflow definition.
name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color
