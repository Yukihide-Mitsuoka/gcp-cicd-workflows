# Reusable: terraform plan on PRs, posting the plan as a collapsed, auto-updating PR
# comment. Auth is keyless (OIDC via Workload Identity Federation — pair with the
# terraform-gcp-modules//modules/github-oidc module).
#
# Caller job needs: permissions: { contents: read, id-token: write, pull-requests: write }
# fmt/validate style gates belong in the caller's own CI (e.g. ai-dev-foundation ci.yml);
# this workflow only runs what needs cloud credentials: init + validate + plan.
name: tf-plan

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory of the terraform root config (e.g. infra/envs/dev)"
        required: true
        type: string
      wif_provider:
        description: "Workload Identity provider resource name (module output workload_identity_provider)"
        required: true
        type: string
      service_account:
        description: "Deployer SA email (module output service_account_email)"
        required: true
        type: string
      terraform_version:
        description: "Terraform version constraint for setup-terraform"
        required: false
        type: string
        default: "latest"
      comment:
        description: "Post/refresh the plan as a PR comment"
        required: false
        type: boolean
        default: true

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Cache providers/modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            ${{ inputs.working_directory }}/.terraform
          key: tf-${{ runner.os }}-${{ inputs.working_directory }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_directory)) }}
          restore-keys: |
            tf-${{ runner.os }}-${{ inputs.working_directory }}-

      - name: terraform init
        run: terraform init -input=false
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > "$RUNNER_TEMP/plan.txt"

      - name: Post plan as PR comment (collapsed, updated in place)
        if: inputs.comment && github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          WORKDIR: ${{ inputs.working_directory }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const marker = `<!-- tf-plan:${process.env.WORKDIR} -->`;
            let plan = 'plan step did not produce output (init/validate failed?)';
            const file = `${process.env.RUNNER_TEMP}/plan.txt`;
            if (fs.existsSync(file)) {
              plan = fs.readFileSync(file, 'utf8');
              const max = 60000;
              if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated — full plan in the workflow log)';
            }
            const icon = process.env.PLAN_OUTCOME === 'success' ? '✅' : '❌';
            const body = [
              marker,
              `### ${icon} terraform plan — \`${process.env.WORKDIR}\``,
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>',
              `*commit ${context.sha.slice(0, 7)} · [run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
