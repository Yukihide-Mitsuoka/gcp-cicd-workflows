# Caller example: gate compiled dbt SQL on every PR (secure-ga4-bq-template rail FR-3).
# Copy into the consumer repo's .github/workflows/ and adjust the with: block.
name: bq-cost-gate

on:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  cost-gate:
    uses: Yukihide-Mitsuoka/gcp-cicd-workflows/.github/workflows/bq-cost-gate.yml@v2
    with:
      sql_glob: "transform/target/compiled/**/*.sql"
      # Checked-in target; MUST compile without ADC, secrets, or runtime installs.
      compile_command: make compile-cost-gate
      project_id: ${{ vars.GCP_PROJECT_ID }}
      wif_provider: ${{ vars.WIF_PROVIDER }}
      # Dedicated dry-run identity; never pass DEPLOYER_SA.
      service_account: ${{ vars.COST_GATE_SA }}
      # default_max_bytes: "100000000000"          # 100 GB unless overridden
      # budgets_file: transform/cost-budgets.yml   # overrides need a reason: field
